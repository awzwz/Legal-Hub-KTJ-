limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=5r/m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS: пересоздание контейнеров меняет IP upstream — без resolver nginx кэширует старые адреса → 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Public liveness/readiness endpoints are handled by the legal API, not the SPA fallback.
    location = /health {
        set $upstream_legal svc-legal:8002;
        proxy_pass http://$upstream_legal;
    }
    location = /readyz {
        set $upstream_legal svc-legal:8002;
        proxy_pass http://$upstream_legal;
    }

    # Микросервисы: маршрутизация по префиксу (длинный префикс важнее общего /api/v1/).
    # proxy_pass с переменной заставляет nginx резолвить имя при каждом запросе (см. resolver выше).
    location = /api/v1/auth/login {
        limit_req zone=login_per_ip burst=5 nodelay;
        limit_req_status 429;
        set $upstream_iam svc-iam:8001;
        proxy_pass http://$upstream_iam;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /api/v1/auth {
        set $upstream_iam svc-iam:8001;
        proxy_pass http://$upstream_iam;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /api/v1/users {
        set $upstream_iam svc-iam:8001;
        proxy_pass http://$upstream_iam;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ПИР / Excel: генерация может занимать минуты — дефолтные 60s nginx обрывают поток → «битый» файл и провал проверки PK.
    location ^~ /api/v1/reports {
        set $upstream_reporting svc-reporting:8004;
        proxy_pass http://$upstream_reporting;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /api/v1/notifications {
        set $upstream_workspace svc-workspace:8003;
        proxy_pass http://$upstream_workspace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /api/v1/audit {
        set $upstream_workspace svc-workspace:8003;
        proxy_pass http://$upstream_workspace;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /api/internal {
        # Internal integrations must use a dedicated private entry point.
        return 404;
    }
    location ^~ /api/v1/ {
        set $upstream_legal svc-legal:8002;
        proxy_pass http://$upstream_legal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite: /assets/* с хэшем в имени — можно кэшировать годами; HTML-оболочка SPA — без кэша,
    # иначе после деплоя браузер держит старый index.html и «не видит» новый фронт.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
