[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: требует поднятых Postgres+Redis и ASGI-стека (запускается через -m integration)
    excel_template: требует тяжёлых PIR-шаблонов в backend/templates (не в основном CI)
