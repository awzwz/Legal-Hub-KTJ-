apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: legalhub-legal-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legalhub-legal
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
