apiVersion: apps/v1
kind: Deployment
metadata:
  name: legalhub-legal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legalhub-legal
  template:
    metadata:
      labels:
        app: legalhub-legal
    spec:
      containers:
        - name: api
          image: legalhub-legal:latest
          ports:
            - containerPort: 8002
          envFrom:
            - secretRef:
                name: legalhub-secrets
          command: ["sh", "-c", "alembic upgrade head && uvicorn app.svc.legal:app --host 0.0.0.0 --port 8002"]
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
