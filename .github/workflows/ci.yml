name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: legalhub
          POSTGRES_PASSWORD: legalhub
          POSTGRES_DB: legalhub_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U legalhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      ENV: dev
      JWT_SECRET: ci-secret-not-for-prod
      INTERNAL_API_KEY: ci-internal-key
      DATABASE_URL: postgresql+asyncpg://legalhub:legalhub@localhost:5432/legalhub_test
      REDIS_URL: redis://localhost:6379/0
      AUTO_DDL: "true"
      RELAX_AUTH: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install
        run: |
          pip install -U pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest -q

  frontend:
    name: Frontend (lint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        # Lint остаётся информативным, но не валит CI из-за shadcn-boilerplate
        # (interface X extends Y, require() в tailwind.config). Тесты решают.
        continue-on-error: true
        run: npm run lint --if-present

      - name: Test
        run: npm test
